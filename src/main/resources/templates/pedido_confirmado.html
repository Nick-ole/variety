<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8">
  <title>Pedido Confirmado - Variety</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<div class="container py-5">
  <div class="card shadow-lg border-0">
    <div class="card-body p-5 text-center">

      <h2 class="fw-bold text-success mb-4">
        <i class="bi bi-check-circle-fill me-2"></i> ¡Pedido Confirmado!
      </h2>

      <!-- DATOS DEL PEDIDO -->
      <p class="fs-5 mb-3">
        <strong>Cliente:</strong> <span th:text="${pedido.nombreCliente}"></span><br>
        <strong>Dirección:</strong> <span th:text="${pedido.direccion}"></span><br>
        <strong>Teléfono:</strong> <span th:text="${pedido.telefono}"></span><br>
        <strong>Método de pago:</strong> <span th:text="${pedido.metodoPago}"></span><br>
        <strong>Total:</strong> S/ <span th:text="${#numbers.formatDecimal(pedido.total,1,'COMMA',2,'POINT')}"></span>
      </p>

      <hr class="my-4">

      <!-- LISTA DE PRODUCTOS AGRUPADOS -->
      <h4 class="fw-semibold mb-3">Productos del Pedido:</h4>

      <ul class="list-group text-start">
        <li class="list-group-item d-flex justify-content-between align-items-center"
            th:each="entry : ${productosAgrupados.entrySet()}">
          <div>
            <strong th:text="${entry.value[0].nombre}"></strong><br>
            <small class="text-muted">
              Precio unitario: S/ <span th:text="${entry.value[0].precio}"></span>
            </small><br>
            <small class="text-muted">
              Cantidad: <span th:text="${entry.value.size()}"></span>
            </small>
          </div>
          <strong>
            S/ <span th:text="${entry.value[0].precio * entry.value.size()}"></span>
          </strong>
        </li>
      </ul>

      <!-- Botón volver -->
      <a th:href="@{/}" class="btn btn-primary mt-4" style="background:#ff4081;border:none;">
        <i class="bi bi-house"></i> Volver a la tienda
      </a>

    </div>
  </div>
</div>

</body>
</html>
