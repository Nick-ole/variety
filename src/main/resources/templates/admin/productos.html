<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8">
  <title>Productos - Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>

<body class="bg-light p-4">

  <div class="container">
    <!-- Encabezado -->
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2 class="mb-0 text-primary fw-bold">
          <i class="bi bi-bag-fill me-2"></i> Gestión de Productos
      </h2>

      <!-- Buscador -->
      <form class="d-flex" method="get" th:action="@{/admin/productos}">
        <input type="text" name="busqueda" class="form-control me-2" style="width:250px;"
               placeholder="Buscar producto..." th:value="${param.busqueda}">
        <button class="btn btn-outline-primary">
          <i class="bi bi-search"></i> Buscar
        </button>
      </form>
    </div>

    <!-- Botón Agregar -->
    <div class="mb-3">
      <button class="btn btn-success" id="btnNuevoProducto" data-bs-toggle="modal" data-bs-target="#productoModal">
        <i class="bi bi-plus-circle"></i> Nuevo Producto
      </button>
    </div>

    <!-- Tabla -->
    <div class="table-responsive shadow-sm rounded-3">
      <table class="table table-striped table-bordered align-middle">
        <thead class="table-dark text-center">
          <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Categoría</th>
            <th>Precio</th>
            <th>Imagen</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="p : ${productos}">
            <td th:text="${p.id}" class="text-center"></td>
            <td th:text="${p.nombre}"></td>
            <td th:text="${p.categoria}"></td>
            <td th:text="'S/ ' + ${p.precio}"></td>
            <td class="text-center">
              <img th:src="@{${p.imagen}}" alt="imagen" style="width:60px;height:60px;object-fit:cover;border-radius:8px;">
            </td>
            <td class="text-center">
              <button class="btn btn-warning btn-sm btnEditar"
                      data-bs-toggle="modal"
                      data-bs-target="#productoModal"
                      th:attr="data-id=${p.id},
                               data-nombre=${p.nombre},
                               data-categoria=${p.categoria},
                               data-precio=${p.precio},
                               data-imagen=${p.imagen}">
                <i class="bi bi-pencil-square"></i> Editar
              </button>

              <a th:href="@{'/admin/productos/eliminar/' + ${p.id}}" class="btn btn-danger btn-sm"
                 onclick="return confirm('¿Eliminar este producto?');">
                <i class="bi bi-trash3"></i> Eliminar
              </a>
            </td>
          </tr>

          <tr th:if="${#lists.isEmpty(productos)}">
            <td colspan="6" class="text-center text-muted py-4">
              <i class="bi bi-box-seam display-6 d-block mb-2"></i>
              No hay productos registrados.
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <a th:href="@{/admin/dashboard}" class="btn btn-secondary mt-3">
      <i class="bi bi-arrow-left-circle"></i> Volver al panel
    </a>
  </div>

  <!-- Modal para agregar/editar producto -->
  <div class="modal fade" id="productoModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">

        <div class="modal-header border-0">
          <h5 class="modal-title" id="tituloModal">Nuevo Producto</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">
          <form th:action="@{/admin/productos/guardar}" method="post">
            <input type="hidden" id="id" name="id">

            <div class="mb-3">
              <label class="form-label">Nombre</label>
              <input type="text" id="nombre" name="nombre" class="form-control" required>
            </div>

            <!-- 🔹 Categoría con opciones -->
            <div class="mb-3">
              <label class="form-label">Categoría</label>
              <select id="categoria" name="categoria" class="form-select" required>
                <option value="">Selecciona una categoría</option>
                <option value="mujer">Mujer</option>
                <option value="hombre">Hombre</option>
                <option value="novedades">Novedades</option>
                <option value="ofertas">Ofertas</option>
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label">Precio</label>
              <input type="number" id="precio" name="precio" class="form-control" step="0.01" required>
            </div>

            <div class="mb-3">
              <label class="form-label">URL de Imagen</label>
              <input type="text" id="imagen" name="imagen" class="form-control" required>
            </div>

            <div class="modal-footer border-0">
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
              <button type="submit" class="btn btn-primary" style="background:#ff4081;border:none;">Guardar</button>
            </div>
          </form>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Script JS dinámico -->
  <script>
    const modal = document.getElementById('productoModal');
    const tituloModal = document.getElementById('tituloModal');
    const idInput = document.getElementById('id');
    const nombreInput = document.getElementById('nombre');
    const categoriaSelect = document.getElementById('categoria');
    const precioInput = document.getElementById('precio');
    const imagenInput = document.getElementById('imagen');

    // 🟢 Nuevo producto
    document.getElementById('btnNuevoProducto').addEventListener('click', () => {
      tituloModal.textContent = "Agregar nuevo producto";
      idInput.value = "";
      nombreInput.value = "";
      categoriaSelect.value = "";
      precioInput.value = "";
      imagenInput.value = "";
    });

    // 🟡 Editar producto (rellena el modal)
    document.querySelectorAll('.btnEditar').forEach(btn => {
      btn.addEventListener('click', () => {
        tituloModal.textContent = "Editar producto";

        idInput.value = btn.getAttribute('data-id');
        nombreInput.value = btn.getAttribute('data-nombre');
        categoriaSelect.value = btn.getAttribute('data-categoria');
        precioInput.value = btn.getAttribute('data-precio');
        imagenInput.value = btn.getAttribute('data-imagen');
      });
    });
  </script>
</body>
</html>
